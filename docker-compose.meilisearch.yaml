#ddev-generated
services:
  meilisearch:
    container_name: ddev-${DDEV_SITENAME}-meilisearch
    image: getmeili/meilisearch:${MEILISEARCH_TAG:-latest}
    expose:
      - 7700
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY:-masterKey}
      - MEILI_ENV=${MEILISEARCH_ENV:-development}
      - VIRTUAL_HOST=$DDEV_HOSTNAME
      - HTTP_EXPOSE=7700:7700
      - HTTPS_EXPOSE=7700:7700
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}
    volumes:
      - meilisearch:/meili_data
      - ".:/mnt/ddev_config"
      - "ddev-global-cache:/mnt/ddev-global-cache"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    depends_on:
      - meilisearch

volumes:
  meilisearch:
